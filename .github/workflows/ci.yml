name: CI

on:
  push:
    branches: [dev, main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build (typecheck + vite)
        run: npm run build

      - name: Unit tests
        run: npm test
